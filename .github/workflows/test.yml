name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

      - name: Enforce per-package coverage floor
        env:
          MIN_COVERAGE: "60"
        run: ./scripts/check_coverage.sh
